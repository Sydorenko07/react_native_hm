version: "3.9"

networks:
  npd421_net:
    driver: bridge

services:
  db:
    image: postgres:18.1
    container_name: npd421-db-container
    restart: unless-stopped
    ports:
      - "5478:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${VOLUME_POSTGRES}
    networks:
      - npd421_net

  api:
    image: novakvova/npd421-api:latest
    container_name: npd421-api-container
    restart: unless-stopped
    volumes:
      - ${VOLUME_SERVERAPI}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ServerRunUrl: "https://silpo.itstep.click"
    ports:
      - "127.0.0.1:4081:8080"
    depends_on:
      - db
    networks:
      - npd421_net

  db-backup:
    image: postgres:18.1
    container_name: npd421-db-backup
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${VOLUME_POSTGRES}:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - npd421_net
    entrypoint: >
      sh -c "
        while true; do
          TIMESTAMP=$$(date +'%Y%m%d%H%M%S')
          pg_dump -h db -U ${POSTGRES_USER} ${POSTGRES_DB} | gzip > /backups/db_$$TIMESTAMP.sql.gz
          
          sleep 86400
        done
      "
